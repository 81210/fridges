spring.application.name=fridges  // 앱 이름
spring.datasource.url=jdbc:mysql://localhost:3306/fridge_db?useSSL=false&serverTimezone=Asia/Seoul  // DB 연결 주소
spring.datasource.username=root // DB사용자 이름
spring.datasource.password=1234 // 비번
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jackson.serialization.write-dates-as-timestamps=false
server.address=127.0.0.1 // 서버 주소 (ngrok IPv6 문제 해결용?)